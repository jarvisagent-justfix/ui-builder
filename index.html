<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Builder — Drag & Drop</title>

  <!-- GrapesJS core -->
  <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.22.2/dist/css/grapes.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="https://unpkg.com/grapesjs@0.22.2"></script>

  <!-- Nostri stili -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-layout">
    <!-- Sidebar sinistra: blocchi -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Blocchi</span>
      </div>
      <div id="blocks"></div>
    </div>

    <!-- Area centrale: toolbar + canvas -->
    <div class="main-area">
      <!-- Toolbar -->
      <div class="toolbar" id="toolbar"></div>
      <!-- Canvas -->
      <div id="gjs"></div>
    </div>
  </div>

  <script src="components/dashboard-cards.js"></script>
  <script src="components/stat-cards.js"></script>
  <script src="components/progress-chart.js"></script>
  <script src="components/task-list.js"></script>
  <script src="components/task-filters.js"></script>
  <script src="components/working-hours.js"></script>
  <script src="components/bottom-nav.js"></script>
  <script src="components/basic-elements.js"></script>
  <script src="components/form-elements.js"></script>
  <script src="components/data-display.js"></script>
  <script src="app.js"></script>

</html>
