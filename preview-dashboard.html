<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Builder — Anteprima Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F6FA; }
    .phone-frame {
      max-width: 390px;
      margin: 20px auto;
      background: #F5F6FA;
      border-radius: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="phone-frame">

    <!-- HEADER -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #F5F6FA;">
      <h1 style="font-size: 24px; font-weight: 700; color: #2D3436; margin: 0;">Dashboard</h1>
      <div style="width: 36px; height: 36px; background: #DFE6E9; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#636E72" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
    </div>

    <!-- PROJECT SUMMARY -->
    <div style="padding: 0 20px 20px;">
      <div style="font-size: 14px; font-weight: 600; color: #2D3436; margin-bottom: 12px;">Project Summary</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div style="background: #E8D5FF; border-radius: 16px; padding: 16px; position: relative; overflow: hidden;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; position: relative;">
            <div><div style="font-size: 28px; font-weight: 700; color: #6C5CE7;">24</div><div style="font-size: 13px; color: #636E72; font-weight: 500;">In Progress</div></div>
            <span style="color: #B2BEC3;">⋯</span>
          </div>
          <svg style="position: absolute; bottom: 0; left: 0; width: 100%; height: 24px; opacity: 0.12;" viewBox="0 0 140 24" preserveAspectRatio="none"><path d="M0,12 C35,0 70,24 105,12 C122.5,6 140,12 140,12 L140,24 L0,24 Z" fill="#6C5CE7"/></svg>
        </div>
        <div style="background: #FFD5F0; border-radius: 16px; padding: 16px; position: relative; overflow: hidden;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; position: relative;">
            <div><div style="font-size: 28px; font-weight: 700; color: #E84393;">56</div><div style="font-size: 13px; color: #636E72; font-weight: 500;">In Review</div></div>
            <span style="color: #B2BEC3;">⋯</span>
          </div>
          <svg style="position: absolute; bottom: 0; left: 0; width: 100%; height: 24px; opacity: 0.12;" viewBox="0 0 140 24" preserveAspectRatio="none"><path d="M0,12 C35,0 70,24 105,12 C122.5,6 140,12 140,12 L140,24 L0,24 Z" fill="#E84393"/></svg>
        </div>
        <div style="background: #FFE8D5; border-radius: 16px; padding: 16px; position: relative; overflow: hidden;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; position: relative;">
            <div><div style="font-size: 28px; font-weight: 700; color: #F39C12;">16</div><div style="font-size: 13px; color: #636E72; font-weight: 500;">On Hold</div></div>
            <span style="color: #B2BEC3;">⋯</span>
          </div>
          <svg style="position: absolute; bottom: 0; left: 0; width: 100%; height: 24px; opacity: 0.12;" viewBox="0 0 140 24" preserveAspectRatio="none"><path d="M0,12 C35,0 70,24 105,12 C122.5,6 140,12 140,12 L140,24 L0,24 Z" fill="#F39C12"/></svg>
        </div>
        <div style="background: #D5FFE8; border-radius: 16px; padding: 16px; position: relative; overflow: hidden;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; position: relative;">
            <div><div style="font-size: 28px; font-weight: 700; color: #00B894;">45</div><div style="font-size: 13px; color: #636E72; font-weight: 500;">Completed</div></div>
            <span style="color: #B2BEC3;">⋯</span>
          </div>
          <svg style="position: absolute; bottom: 0; left: 0; width: 100%; height: 24px; opacity: 0.12;" viewBox="0 0 140 24" preserveAspectRatio="none"><path d="M0,12 C35,0 70,24 105,12 C122.5,6 140,12 140,12 L140,24 L0,24 Z" fill="#00B894"/></svg>
        </div>
      </div>
    </div>

    <!-- PROJECT STATISTICS -->
    <div style="padding: 0 20px 20px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <div style="font-size: 14px; font-weight: 600; color: #2D3436;">Project Statistics</div>
        <span style="color: #B2BEC3;">⋯</span>
      </div>
      <div style="background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
        <!-- Bars -->
        <div style="display: flex; align-items: flex-end; gap: 6px; height: 100px;">
          <div style="flex-direction: column; align-items: flex-end; display: flex; padding-right: 4px; gap: 20px; font-size: 11px; color: #B2BEC3;">
            <span>100</span><span>50</span><span>0</span>
          </div>
          <div style="flex:1; display:flex; justify-content:center; gap:2px; align-items:flex-end; height:100px;"><div style="width:10px; background:#6C5CE7; border-radius:3px 3px 0 0; height:60px"></div><div style="width:10px; background:#E84393; border-radius:3px 3px 0 0; height:45px"></div><div style="width:10px; background:#00B894; border-radius:3px 3px 0 0; height:35px"></div></div>
          <div style="flex:1; display:flex; justify-content:center; gap:2px; align-items:flex-end; height:100px;"><div style="width:10px; background:#6C5CE7; border-radius:3px 3px 0 0; height:70px"></div><div style="width:10px; background:#E84393; border-radius:3px 3px 0 0; height:50px"></div><div style="width:10px; background:#00B894; border-radius:3px 3px 0 0; height:40px"></div></div>
          <div style="flex:1; display:flex; justify-content:center; gap:2px; align-items:flex-end; height:100px;"><div style="width:10px; background:#6C5CE7; border-radius:3px 3px 0 0; height:50px"></div><div style="width:10px; background:#E84393; border-radius:3px 3px 0 0; height:70px"></div><div style="width:10px; background:#00B894; border-radius:3px 3px 0 0; height:45px"></div></div>
          <div style="flex:1; display:flex; justify-content:center; gap:2px; align-items:flex-end; height:100px;"><div style="width:10px; background:#6C5CE7; border-radius:3px 3px 0 0; height:80px"></div><div style="width:10px; background:#E84393; border-radius:3px 3px 0 0; height:40px"></div><div style="width:10px; background:#00B894; border-radius:3px 3px 0 0; height:60px"></div></div>
          <div style="flex:1; display:flex; justify-content:center; gap:2px; align-items:flex-end; height:100px;"><div style="width:10px; background:#6C5CE7; border-radius:3px 3px 0 0; height:40px"></div><div style="width:10px; background:#E84393; border-radius:3px 3px 0 0; height:30px"></div><div style="width:10px; background:#00B894; border-radius:3px 3px 0 0; height:70px"></div></div>
          <div style="flex:1; display:flex; justify-content:center; gap:2px; align-items:flex-end; height:100px;"><div style="width:10px; background:#6C5CE7; border-radius:3px 3px 0 0; height:65px"></div><div style="width:10px; background:#E84393; border-radius:3px 3px 0 0; height:55px"></div><div style="width:10px; background:#00B894; border-radius:3px 3px 0 0; height:50px"></div></div>
          <div style="flex:1; display:flex; justify-content:center; gap:2px; align-items:flex-end; height:100px;"><div style="width:10px; background:#6C5CE7; border-radius:3px 3px 0 0; height:90px"></div><div style="width:10px; background:#E84393; border-radius:3px 3px 0 0; height:65px"></div><div style="width:10px; background:#00B894; border-radius:3px 3px 0 0; height:75px"></div></div>
        </div>
        <!-- Days -->
        <div style="display: flex; gap: 6px; margin-top: 8px; margin-left: 32px;">
          <div style="flex:1; text-align:center; font-size:11px; color:#B2BEC3;">S</div>
          <div style="flex:1; text-align:center; font-size:11px; color:#B2BEC3;">M</div>
          <div style="flex:1; text-align:center; font-size:11px; color:#B2BEC3;">T</div>
          <div style="flex:1; text-align:center; font-size:11px; color:#B2BEC3;">W</div>
          <div style="flex:1; text-align:center; font-size:11px; color:#B2BEC3;">T</div>
          <div style="flex:1; text-align:center; font-size:11px; color:#B2BEC3;">F</div>
          <div style="flex:1; text-align:center; font-size:11px; color:#636E72; font-weight:600;">S</div>
        </div>
        <!-- Legend -->
        <div style="display: flex; gap: 16px; justify-content: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #F0F0F0;">
          <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #636E72;"><span style="width:8px;height:8px;background:#6C5CE7;border-radius:2px"></span> Progress</div>
          <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #636E72;"><span style="width:8px;height:8px;background:#E84393;border-radius:2px"></span> Reviewed</div>
          <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #636E72;"><span style="width:8px;height:8px;background:#00B894;border-radius:2px"></span> Complete</div>
        </div>
      </div>
    </div>

    <!-- BOTTOM STATS -->
    <div style="padding: 0 20px 20px;">
      <div style="display: flex; gap: 12px;">
        <div style="flex:1; background:white; border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <div style="font-size:12px; color:#636E72; margin-bottom:4px;">Total working hour</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:18px; font-weight:700; color:#2D3436;">50:25:06</span>
            <span style="font-size:11px; font-weight:600; color:white; background:#00B894; padding:2px 8px; border-radius:20px;">34%</span>
          </div>
        </div>
        <div style="flex:1; background:white; border-radius:16px; padding:14px; box-shadow:0 2px 8px rgba(0,0,0,0.04);">
          <div style="font-size:12px; color:#636E72; margin-bottom:4px;">Total task activity</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:18px; font-weight:700; color:#2D3436;">125 Task</span>
            <span style="font-size:11px; font-weight:600; color:white; background:#6C5CE7; padding:2px 8px; border-radius:20px;">50%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div style="display: flex; justify-content: space-around; align-items: center; padding: 10px 20px; background: white; border-top: 1px solid #F0F0F0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B2BEC3" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <div style="display:flex; align-items:center; gap:6px; background:#2D3436; padding:6px 16px; border-radius:20px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <span style="font-size:13px; font-weight:600; color:white;">Task</span>
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B2BEC3" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#B2BEC3"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-8 8-8s8 4 8 8"/></svg>
    </div>

  </div>
  <p style="text-align: center; margin: 20px; color: #B2BEC3; font-size: 13px;">Anteprima Dashboard — Vai all'editor per modificare</p>
</body>
</html>
